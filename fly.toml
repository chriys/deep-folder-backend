app = "deep-folder"
primary_region = "us-east"

[build]
builder = "pacer"

[build.args]
PYTHON_VERSION = "3.12"

[env]
LOG_LEVEL = "info"

[[services]]
internal_port = 8000
processes = ["api"]

[services.http_checks]
interval = 10000
timeout = 5000
grace_period = "5s"
method = "get"
path = "/health"

[[processes]]
name = "api"
cmd = "uvicorn src.app.main:app --host 0.0.0.0 --port 8000"
auto_start = true
auto_stop = true

[[processes]]
name = "worker"
cmd = ""
auto_start = false
auto_stop = false

[[processes]]
name = "scheduler"
cmd = ""
auto_start = false
auto_stop = false

[deploy]
release_command = "alembic upgrade head"
