app = "deep-folder-backend"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[deploy]
  release_command = "sh -c 'alembic upgrade 001 && alembic upgrade 0010 && alembic upgrade 0011'"

[env]
  PORT = "8080"

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1

[http_service]
  processes = ["api"]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = "connections"
    hard_limit = 25
    soft_limit = 20

[[http_service.checks]]
  grace_period = "10s"
  interval = "30s"
  method = "GET"
  path = "/health"
  timeout = "5s"

[processes]
  api = "uvicorn deepfolder.main:app --host 0.0.0.0 --port 8080"
  worker = "python scripts/run_worker.py"
  scheduler = "python scripts/run_scheduler.py"
