app = "deep-folder-backend"
primary_region = "iad"

[build]

[env]
PORT = "8080"

[http_service]
internal_port = 8080
force_https = true
auto_stop_machines = "stop"
auto_start_machines = true
min_machines_running = 0
processes = ["api"]

[[http_service.checks]]
grace_period = "10s"
interval = "30s"
method = "GET"
path = "/health"
timeout = "5s"

[processes]
api = "uvicorn deepfolder.main:app --host 0.0.0.0 --port 8080"
worker = "python scripts/run_worker.py"
scheduler = "python scripts/run_scheduler.py"

[deploy]
release_command = "alembic upgrade head"

[[vm]]
memory = "512mb"
cpu_kind = "shared"
cpus = 1
