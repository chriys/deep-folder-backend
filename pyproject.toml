[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "deepfolder"
version = "0.1.0"
requires-python = ">=3.12"
dependencies = [
    "fastapi>=0.115.0",
    "pydantic>=2.0.0",
    "pydantic-settings>=2.0.0",
    "sqlalchemy>=2.0.0",
    "alembic>=1.13.0",
    "httpx>=0.27.0",
    "tenacity>=8.0.0",
    "uvicorn[standard]>=0.30.0",
    "google-api-python-client>=2.0.0",
    "google-auth-oauthlib>=1.2.0",
    "cryptography>=42.0.0",
    "structlog>=24.0.0",
    "asyncpg>=0.29.0",
    "pgvector>=0.3.0",
]

[dependency-groups]
dev = [
    "ruff>=0.6.0",
    "mypy>=1.11.0",
    "pytest>=8.3.0",
    "pytest-asyncio>=0.24.0",
    "pytest-postgresql>=6.1.0",
    "types-google-cloud-ndb>=2.3.0",
]

[tool.hatch.build.targets.wheel]
packages = ["src/deepfolder"]

[tool.ruff]
target-version = "py312"
line-length = 100

[tool.ruff.lint]
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes
    "I",   # isort
    "B",   # flake8-bugbear
    "C4",  # flake8-comprehensions
    "UP",  # pyupgrade
]

[tool.mypy]
python_version = "3.12"
strict = true
plugins = ["pydantic.mypy"]

[[tool.mypy.overrides]]
module = [
    "google.*",
    "googleapiclient.*",
]
ignore_missing_imports = true

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
